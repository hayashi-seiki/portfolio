<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="description" content="デザイナー 林 正毅(SEIKI HAYASHI)のお問い合わせページです。" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>CONTACT | SEIKI HAYASHI</title>
    <link href="css/style.css" rel="stylesheet" />
    <link href="icons/favicon.ico" rel="icon" sizes="32x32" />
    <link href="icons/icon.svg" rel="icon" type="image/svg+xml" />
    <link href="icons/apple-touch-icon.png" rel="apple-touch-icon" />
</head>
<body>
    <header class="page-header">
        <h1 class="page-logo">
            <a href="index.html">SEIKI HAYASHI</a>
        </h1>
        <button aria-label="メニューを開く" class="hamburger-menu">
            <span></span><span></span><span></span>
        </button>
        <nav class="page-navigation">
            <ul>
                <li><a href="index.html#works">WORKS</a></li>
                <li><a href="index.html#profile">ABOUT</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="section bg-contact">
            <div class="container">
                <h2 class="section-title animate">CONTACT</h2>
                
                <div class="contact-lead">
                    <p>
                        制作のご依頼、お見積りのご相談など、お気軽にお問い合わせください。<br>
                        内容を確認の上、3営業日以内にご返信いたします。
                    </p>
                </div>

                <div class="form-wrapper">
                    <script>
                        var submitted = false;
                    </script>
                    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted){window.location.href='thanks.html';}"></iframe>
                    
                    <form id="contactForm" action="https://docs.google.com/forms/d/e/1FAIpQLSc-fAqyDMhgpFV2hson9fHtiZNu2y4cmRQ-InMlVDjYoxJThw/formResponse" method="POST" target="hidden_iframe" novalidate>
                        
                        <div class="form-group">
                            <label class="form-label" for="entry-name">お名前 <span class="required">必須</span></label>
                            <input type="text" id="entry-name" name="entry.1018318041" class="form-input" required aria-required="true" autocomplete="name" placeholder="例: 山田 太郎">
                            <span class="error-msg">お名前を入力してください。</span>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="entry-company">会社名 <span class="optional">任意</span></label>
                            <input type="text" id="entry-company" name="entry.1481971720" class="form-input" autocomplete="organization" placeholder="例: 株式会社〇〇">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="entry-email">メールアドレス <span class="required">必須</span></label>
                            <input type="email" id="entry-email" name="entry.2062797601" class="form-input" required aria-required="true" autocomplete="email" placeholder="例: sample@example.com">
                            <span class="error-msg">有効なメールアドレスを入力してください。</span>
                        </div>

                        <div class="form-group">
                            <fieldset>
                                <legend class="form-label">ご相談項目（複数選択可）<span class="required">必須</span></legend>
                                <div class="checkbox-group" id="entry-consultation">
                                    <label class="checkbox-label">
                                        <input type="checkbox" name="entry.784091772" value="Webデザイン">
                                        <span class="checkbox-custom"></span>Webデザイン
                                    </label>
                                    <label class="checkbox-label">
                                        <input type="checkbox" name="entry.784091772" value="グラフィックデザイン">
                                        <span class="checkbox-custom"></span>グラフィックデザイン
                                    </label>
                                    <label class="checkbox-label">
                                        <input type="checkbox" name="entry.784091772" value="その他">
                                        <span class="checkbox-custom"></span>その他
                                    </label>
                                </div>
                                <span class="error-msg">いずれか1つ以上を選択してください。</span>
                            </fieldset>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="entry-budget">ご予算 <span class="optional">任意</span></label>
                            <input type="text" id="entry-budget" name="entry.751477725" class="form-input" placeholder="例: 30〜40万円">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="entry-deadline">納期 <span class="optional">任意</span></label>
                            <input type="text" id="entry-deadline" name="entry.1074874125" class="form-input" placeholder="例: 2026年12月末予定">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="entry-message">お問い合わせ内容 <span class="required">必須</span></label>
                            <textarea id="entry-message" name="entry.850896904" class="form-textarea" required aria-required="true" rows="6" placeholder="ご自由にご記入ください。"></textarea>
                            <span class="error-msg">お問い合わせ内容を入力してください。</span>
                        </div>

                        <div class="form-submit">
                            <button type="submit" class="btn-top btn-submit">
                                <span class="btn-text">送信する</span>
                                <span class="spinner"></span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; SEIKI HAYASHI. All Rights Reserved.</p>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
